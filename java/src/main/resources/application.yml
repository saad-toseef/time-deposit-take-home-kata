spring:
  datasource:
    url: jdbc:h2:mem:time-deposit-db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none  # let schema.sql and seed data run
    show-sql: true

# enable H2 console
spring.h2.console.enabled: true
spring.h2.console.path: /h2-console
server:
  port: 8080
